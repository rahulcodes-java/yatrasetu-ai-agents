<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YatraSetu Agent Console</title>
  <meta name="description" content="YatraSetu AI Agent Console – Chat with Heritage and Safety travel agents powered by AI." />
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <!-- marked.js for Markdown rendering (Fix 2) -->
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <link rel="stylesheet" href="style.css?v=2" />
</head>
<body>
  <header>
    <div class="header-inner">
      <!-- Logo mark -->
      <div class="logo-mark" aria-hidden="true">
        <svg width="24" height="24" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="18" cy="18" r="18" fill="url(#logoGrad)"/>
          <path d="M10 24 Q14 12 18 10 Q22 12 26 24" stroke="#ffffff" stroke-width="2.2" fill="none" stroke-linecap="round"/>
          <circle cx="18" cy="10" r="3" fill="#ffffff" opacity="0.9"/>
          <path d="M13 20 Q18 17 23 20" stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
          <defs>
            <linearGradient id="logoGrad" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#0a3d62"/>
              <stop offset="100%" stop-color="#4ecdc4"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="header-text">
        <h1>YatraSetu</h1>
      </div>
    </div>
  </header>

  <section class="hero-section">
    <div class="hero-icon">📍</div>
    <h2>Plan Your Perfect Indian Journey</h2>
    <p>Tell us where, when, and how much. We'll handle the rest.</p>
  </section>

  <main>
    <div class="layout-wrapper">

      <!-- Agent selector (Removed as Planner handles all) -->

      <!-- Chat window -->
      <section class="chat-window" id="chatWindow" aria-live="polite" aria-label="Chat conversation">
        <!-- Messages appended by script.js -->
        <div class="chat-empty-state" id="emptyState">
          <div class="empty-icon" aria-hidden="true">✨</div>
          <p>Your personalized travel plan will appear here.</p>
        </div>
      </section>

      <!-- Input area -->
      <section class="input-area">
        <input
          type="text"
          id="messageInput"
          placeholder="Where do you want to go? (e.g., 'Rajasthan, 5 days, ₹50k for 2 people')"
          autocomplete="off"
          aria-label="Message input"
        />
        <button id="sendButton" aria-label="Send message">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
          Send
        </button>
      </section>

    </div>
  </main>

  <script src="script.js?v=4"></script>
</body>
</html>
