<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YatraSetu – AI Travel Companion</title>
  <meta name="description" content="YatraSetu AI Travel Companion – Plan your perfect Indian journey with AI-powered heritage and safety insights." />
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <!-- Tabler Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.34.0/dist/tabler-icons.min.css" />
  <!-- marked.js for Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <link rel="stylesheet" href="style.css?v=6" />
</head>
<body>

  <!-- ============================================================
       HEADER
  ============================================================ -->
  <header role="banner">
    <div class="header-inner">
      <!-- Left: Logo + Wordmark -->
      <div class="header-left">
        <div class="logo-mark" aria-hidden="true">
          <svg width="26" height="26" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="18" cy="18" r="18" fill="url(#logoGrad)"/>
            <path d="M10 24 Q14 12 18 10 Q22 12 26 24" stroke="#ffffff" stroke-width="2.2" fill="none" stroke-linecap="round"/>
            <circle cx="18" cy="10" r="3" fill="#ffffff" opacity="0.9"/>
            <path d="M13 20 Q18 17 23 20" stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
            <defs>
              <linearGradient id="logoGrad" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#0a3d62"/>
                <stop offset="100%" stop-color="#4ecdc4"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1>YatraSetu</h1>
      </div>

      <!-- Right: Nav Actions -->
      <nav class="header-nav" aria-label="Header navigation">
        <!-- Dark mode toggle -->
        <button id="darkModeToggle" class="icon-btn" aria-label="Toggle dark mode" title="Toggle dark mode">
          <i class="ti ti-sun" id="themeIcon" aria-hidden="true"></i>
        </button>

        <!-- Settings -->
        <button id="settingsToggle" class="icon-btn" aria-label="Settings" title="Settings">
          <i class="ti ti-settings" aria-hidden="true"></i>
        </button>

      </nav>
    </div>

    <!-- Settings Popover -->
    <div id="settingsPopover" class="settings-popover" role="dialog" aria-label="Settings" aria-hidden="true">

      <!-- Dark mode row -->
      <div class="settings-row">
        <span class="settings-label">Dark mode</span>
        <button id="settingsDarkToggle" class="toggle-switch" aria-label="Toggle dark mode" role="switch" aria-checked="false">
          <span class="toggle-thumb"></span>
        </button>
      </div>

      <div class="settings-divider"></div>

      <!-- Agent selection -->
      <p class="settings-section-label">Agent</p>

      <label class="settings-radio-row" for="agentPlanner">
        <input type="radio" id="agentPlanner" name="agentChoice" value="planner_agent" checked />
        <span class="settings-radio-text">
          <span class="settings-radio-title">Planner <span class="settings-badge">Recommended</span></span>
          <span class="settings-radio-sub">Combines all agents automatically</span>
        </span>
      </label>

      <label class="settings-radio-row" for="agentSpecific">
        <input type="radio" id="agentSpecific" name="agentChoice" value="specific" />
        <span class="settings-radio-text">
          <span class="settings-radio-title">Specific agent</span>
          <span class="settings-radio-sub">Talk directly to one agent</span>
        </span>
      </label>

      <!-- Sub-agent dropdown (hidden until "specific" is chosen) -->
      <div id="specificAgentRow" class="specific-agent-row" hidden>
        <select id="specificAgentSelect" aria-label="Select agent">
          <option value="heritage_agent">Heritage Agent</option>
          <option value="safety_agent">Safety Agent</option>
          <option value="booking_agent">Booking Agent</option>
          <option value="itinerary_agent">Itinerary Agent</option>
          <option value="budget_agent">Budget Agent</option>
        </select>
      </div>

      <div class="settings-divider"></div>

      <!-- Clear chat -->
      <button id="clearChatBtn" class="settings-action-btn">
        <i class="ti ti-trash" aria-hidden="true"></i>
        Clear chat history
      </button>

    </div>
  </header>

  <!-- ============================================================
       COMPACT HERO BANNER
  ============================================================ -->
  <section class="hero-section" aria-label="Welcome banner">
    <i class="ti ti-compass hero-icon" aria-hidden="true"></i>
    <div class="hero-text">
      <h2>Plan your perfect Indian journey</h2>
      <p>AI-powered itineraries, heritage insights, and safety advice — all in one place.</p>
    </div>
  </section>

  <!-- ============================================================
       MAIN CONTENT
  ============================================================ -->
  <main role="main">
    <div class="layout-wrapper">

      <!-- Chat window -->
      <section class="chat-window" id="chatWindow" aria-live="polite" aria-label="Chat conversation" aria-atomic="false">

        <!-- Empty state -->
        <div class="chat-empty-state" id="emptyState">
          <i class="ti ti-map-search empty-icon" aria-hidden="true"></i>
          <p class="empty-title">Start your journey</p>
          <p class="empty-subtitle">Ask about any destination in India</p>
          <div class="example-queries" role="group" aria-label="Example questions">
            <button class="example-chip" data-query="Plan a 5-day trip to Rajasthan with ₹50,000 budget for 2 people">
              Plan a 5-day trip to Rajasthan
            </button>
            <button class="example-chip" data-query="Is Goa safe for solo female travelers?">
              Is Goa safe for solo travelers?
            </button>
            <button class="example-chip" data-query="Budget breakdown for Kerala trip for 2 weeks">
              Budget breakdown for Kerala 2 weeks
            </button>
          </div>
        </div>
        <!-- Messages appended by script.js -->
      </section>

      <!-- Sticky input area -->
      <section class="input-area" aria-label="Message input">
        <label for="messageInput" class="sr-only">Enter your travel question</label>
        <input
          type="text"
          id="messageInput"
          placeholder="Where do you want to go? (e.g., Jaipur, 5 days, ₹50k)"
          autocomplete="off"
          aria-label="Enter your travel question"
          maxlength="500"
        />
        <button id="sendButton" aria-label="Send message">
          <i class="ti ti-send" aria-hidden="true"></i>
          <span id="sendBtnText">Plan</span>
        </button>
      </section>

    </div>
  </main>

  <footer role="contentinfo">
    <div class="footer-inner">&copy; 2026 YatraSetu</div>
  </footer>

  <script src="script.js?v=6"></script>
</body>
</html>
